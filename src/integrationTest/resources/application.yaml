# Integration test Quarkus configuration

quarkus:
  datasource:
    devservices:
      enabled: true
      reuse: false
  hibernate-orm:
    schema-management:
      strategy: validate
    physical-naming-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
  flyway:
    migrate-at-start: true
  scheduler:
    enabled: false
  rest-client:
    alphavantage-api:
      url: http://localhost:8089
      scope: jakarta.inject.Singleton
      connect-timeout: 5000
      read-timeout: 10000
    yhfinance-api:
      url: http://localhost:8089
      scope: jakarta.inject.Singleton
      connect-timeout: 5000
      read-timeout: 10000

alphavantage:
  api:
    key: test-alphavantage-key
    base-url: http://localhost:8089

yhfinance:
  api:
    key: test-yhfinance-key
    base-url: http://localhost:8089

collector:
  resilience:
    yhfinance:
      requests-per-window: 1000
      window-seconds: 60
    alphavantage:
      requests-per-window: 1000
      window-seconds: 60
    retry:
      max-attempts: 1
      base-backoff-millis: 10
      max-backoff-millis: 10
      jitter-millis: 0
