quarkus:
  config:
    locations: config/currency-mapping.yaml
  live-reload:
    instrumentation: true
  analytics:
    disabled: false
  scheduler:
    enabled: false  # Schedulers disabled — use REST controllers instead

  hibernate-orm:
    active: true
    log:
      sql: true
    schema-management:
      strategy: validate
    physical-naming-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    mapping:
      format:
        global: ignore
  flyway:
    migrate-at-start: true

  # REST Client configuration
  rest-client:
    yhfinance-api:
      url: ${yhfinance.api.base-url}
      scope: jakarta.inject.Singleton
      connect-timeout: 5000
      read-timeout: 30000
    alphavantage-api:
      url: ${alphavantage.api.base-url}
      scope: jakarta.inject.Singleton
      connect-timeout: 5000
      read-timeout: 30000

yhfinance:
  api:
    key: ${YH_FINANCE_API_KEY}
    base-url: 'https://yfapi.net'

alphavantage:
  api:
    key: ${AV_API_KEY}
    base-url: 'https://alpha-vantage.p.rapidapi.com/'

#link to yhfinance API:
#  https://financeapi.net/

collector:
  scheduler:
    monthly:
      cron: "0 0 1 1 * ?"
    quarterly:
      cron: "0 0 2 1 1,4,7,10 ?"
  resilience:
    yhfinance:
      requests-per-window: 300
      window-seconds: 60
    alphavantage:
      requests-per-window: 5
      window-seconds: 60
    retry:
      max-attempts: 2
      base-backoff-millis: 5000
      max-backoff-millis: 5000
      jitter-millis: 250
